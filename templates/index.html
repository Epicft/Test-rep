<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Task Manager</h1>

        <!-- Статистика -->
        <div class="stats">
            <p>Всего задач: {{ total_tasks }}</p>
            <p>Завершено: {{ completed_tasks }}</p>
        </div>

        <!-- Форма добавления задачи -->
        <div class="add-task">
            <h2>Добавить задачу</h2>
            <form id="taskForm">
                <input type="text" id="taskName" placeholder="Название задачи" required>
                <textarea id="taskDescription" placeholder="Описание"></textarea>
                <button type="submit">Добавить задачу</button>
            </form>
        </div>

        <!-- Список задач -->
        <div class="tasks-list">
            <h2>Список задач</h2>
            <div id="tasksContainer">
                {% if tasks %}
                    {% for task in tasks %}
                        <div class="task-item {% if task.is_completed %}completed{% endif %}">
                            <h3>{{ task.name }}</h3>
                            {% if task.description %}
                                <p>{{ task.description }}</p>
                {% endif %}
            </div>
            {% endfor %}
                {% else %}
                    <p class="no-tasks">Задач пока нет</p>
                {% endif %}
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
